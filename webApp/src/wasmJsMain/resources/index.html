<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="description" content="Metal Detector Audio — AI-powered audio classification for metal detecting">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Detector Audio">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1565C0">

  <title>Metal Detector Audio</title>

  <link rel="manifest" href="/app/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/app/icons/icon-192.png">
  <link rel="icon" type="image/png" href="/app/icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">

  <!-- onnxruntime-web (vendored, single-threaded WASM backend) -->
  <script src="/app/ort.min.js"></script>
  <script>
    // Force single-threaded to avoid needing COOP/COEP headers
    if (typeof ort !== 'undefined') {
      ort.env.wasm.numThreads = 1;
      ort.env.wasm.wasmPaths = '/app/';
    }

    // Request persistent storage so Safari/Chrome don't evict the IndexedDB
    // dataset (Safari purges after ~7 days of inactivity otherwise).
    if (navigator.storage && navigator.storage.persist) {
      navigator.storage.persist().then(function(granted) {
        console.log('Persistent storage ' + (granted ? 'granted' : 'denied'));
      }).catch(function() {});
    }
  </script>
</head>
<body>
  <div id="app-loading">
    <div class="loading-spinner"></div>
    <p>Loading Metal Detector Audio…</p>
  </div>

  <script src="webApp.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      // If a service worker already controls this page, reload once when a newer
      // worker takes over. Without this, a returning visitor can stay pinned to a
      // stale cached app shell across sessions — which suppresses Chrome's install
      // affordance and ships old code. The guard (controller must already exist)
      // means the very first install does NOT trigger a reload.
      if (navigator.serviceWorker.controller) {
        var reloadingForSwUpdate = false;
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          if (reloadingForSwUpdate) return;
          reloadingForSwUpdate = true;
          window.location.reload();
        });
      }
      navigator.serviceWorker.register('/app/sw.js', { scope: '/app/' })
        .then(function(reg) {
          console.log('SW registered', reg.scope);
          // sw.js is served no-cache, so proactively checking on each load picks up
          // a new deploy promptly instead of waiting for the browser's ~24h cycle.
          reg.update();
        })
        .catch(function(e) { console.warn('SW registration failed', e); });
    }
  </script>
</body>
</html>
