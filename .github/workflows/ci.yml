name: CI

on:
  push:
  pull_request:

# Cancel redundant runs on the same branch (keep latest).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. Python validation & tests (fast, no Android SDK needed)
  # ---------------------------------------------------------------------------
  verify-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy

      - name: Validate starter-model assets
        run: python scripts/train_starter_model.py --dry-run

      - name: Run Python tests
        run: python -m unittest tests.test_train_starter_model

  # ---------------------------------------------------------------------------
  # 2. Android unit tests
  # ---------------------------------------------------------------------------
  verify-android:
    runs-on: ubuntu-latest
    needs: verify-python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies (needed by Gradle validation task)
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Run Android unit tests
        run: ./gradlew :app:testDebugUnitTest

  # ---------------------------------------------------------------------------
  # 3. Build debug APK & upload as artifact
  # ---------------------------------------------------------------------------
  build-apk:
    runs-on: ubuntu-latest
    needs: verify-android
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies (needed by Gradle validation task)
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: metal-detector-audio-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 90
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 4. Create GitHub Release with APK on version tags (v*)
  # ---------------------------------------------------------------------------
  release-apk:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build-apk
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: metal-detector-audio-debug-apk
          path: apk-out

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apk-out/*.apk
          generate_release_notes: true
