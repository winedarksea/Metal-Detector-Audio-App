name: Deploy Web to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy detectoraudio.com
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Build wasmJs distribution
        run: ./gradlew :webApp:wasmJsBrowserDistribution

      # ── Assemble the dist/ directory ──────────────────────────────────────
      - name: Create dist/ layout
        run: |
          mkdir -p dist/app/icons

          # Landing page at site root
          cp -r web/landing/. dist/

          # Compose WASM bundle → /app/
          cp -r webApp/build/dist/wasmJs/productionExecutable/. dist/app/

          # PWA extras (sw.js, manifest, mic-worklet.js, _headers, icons/)
          cp -r web/app-extra/. dist/app/

          # Model assets
          cp models/starter_model_cnn.onnx        dist/app/
          cp models/starter_model_metadata.json   dist/app/
          cp models/starter_model_no_mixed_cnn.onnx      dist/app/
          cp models/starter_model_no_mixed_metadata.json dist/app/

          # Download onnxruntime-web into dist/ so it is served same-origin from /app/
          # at runtime (no CDN dependency once deployed). --retry guards against transient
          # CDN hiccups so the deploy doesn't fail on a single blip.
          ORT_VERSION=1.18.0
          for f in ort.min.js ort-wasm.wasm ort-wasm-simd.wasm; do
            curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors \
              "https://cdn.jsdelivr.net/npm/onnxruntime-web@${ORT_VERSION}/dist/$f" -o "dist/app/$f"
          done

          # Root _headers (merge app-level headers)
          cat web/app-extra/_headers >> dist/_headers 2>/dev/null || true

          echo "=== dist/ top-level ==="
          ls dist/
          echo "=== dist/app/ ==="
          ls dist/app/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=detectoraudio --branch=main
